# ============================================
# GRAFIDE — Local Development Profile
# Active when: spring.profiles.active=local
# Uses your locally installed MongoDB.
# Listed in .gitignore — never committed.
# ============================================

# ---- MongoDB (local) ----
spring.data.mongodb.uri=mongodb://localhost:27017/grafide
spring.data.mongodb.database=grafide

# ---- JWT ----
# Generate a secure secret:
# node -e "console.log(require('crypto').randomBytes(64).toString('base64'))"
grafide.jwt.secret=3lVkAnw7lho06+ZzS39uGpBqss/wrB2BOsMZRAKLNV+/EhKZ8yggDcK82wLtgh+DOxRt0DMFI1uHzCUke/tYSw==

# ---- SendGrid ----
# Paste your SendGrid API key here for local email testing
# Leave as placeholder if you don't want emails firing locally
grafide.sendgrid.api-key=REPLACE_WITH_YOUR_SENDGRID_API_KEY
grafide.sendgrid.from-email=noreply@grafide.com

# ---- CORS ----
grafide.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500

# ---- Logging (verbose for dev) ----
logging.level.com.grafide=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb=DEBUG
