# ============================================
# GRAFIDE — Base Configuration
# Shared across all profiles.
# Does NOT contain secrets or MongoDB URI.
# Profile-specific files override these.
# ============================================

server.port=8080

# ---- JWT defaults ----
grafide.jwt.expiration-ms=86400000

# ---- SendGrid defaults ----
grafide.sendgrid.from-name=Grafide

# ---- Jackson ----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ---- Active profile ----
# Override this by setting SPRING_PROFILES_ACTIVE environment variable
# Local dev:   spring.profiles.active=local
# Production:  spring.profiles.active=prod
spring.profiles.active=local
