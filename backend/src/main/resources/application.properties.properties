# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/grafide
spring.data.mongodb.database=grafide

# JWT Configuration
grafide.jwt.secret=g3JCX8VFz0l1cWz7iypUT5AjEfTgN73LTAfHIn2y8JHK+eHU8Xfx1AdCHSuiSjpqgCGFsy/WhJfQz6VtYVhwwg==
